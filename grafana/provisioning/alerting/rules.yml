apiVersion: 1

groups:
  - orgId: 1
    name: onuljang-infra
    folder: Onuljang Alerts
    interval: 1m
    rules:
      - uid: heap-high
        title: JVM Heap 사용률 높음
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} * 100
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM Heap 사용률 {{ $value | printf \"%.0f\" }}%"

      - uid: hikaricp-pending
        title: HikariCP 대기 커넥션 과다
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: hikaricp_connections_pending
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "HikariCP 대기 커넥션 {{ $value }}개"

      - uid: http-5xx-rate
        title: HTTP 5xx 에러율 높음
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
                / sum(rate(http_server_requests_seconds_count[5m])) * 100
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 5xx 에러율 {{ $value | printf \"%.1f\" }}%"

      - uid: cpu-high
        title: CPU 사용률 높음
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: system_cpu_usage * 100
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 사용률 {{ $value | printf \"%.0f\" }}%"

  - orgId: 1
    name: onuljang-business
    folder: Onuljang Alerts
    interval: 5m
    rules:
      - uid: negative-stock
        title: 재고 음수 감지
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: onuljang_negative_stock_products
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "재고 음수 상품 {{ $value }}개"

      - uid: payment-failure-rate
        title: PG 결제 실패 (시스템 오류)
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(increase(onuljang_payments_total{result="fail", reason="system"}[10m]))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PG 시스템 결제 실패 {{ $value }}건 (최근 10분)"

  - orgId: 1
    name: onuljang-delivery
    folder: Onuljang Alerts
    interval: 5m
    rules:
      - uid: tracking-failure-rate
        title: 배송 트래킹 요청 실패율 높음
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                sum(increase(onuljang_tracking_requests_total{result="fail"}[10m]))
                / (sum(increase(onuljang_tracking_requests_total[10m])) > 0) * 100
              instant: true
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "배송 트래킹 실패율 {{ $value | printf \"%.0f\" }}% (최근 10분)"

      - uid: active-orders-high
        title: 처리 중 택배 주문 과다
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: onuljang_active_courier_orders
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [200]
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "처리 중 택배 주문 {{ $value }}건 — 적체 가능성"

  - orgId: 1
    name: onuljang-payment
    folder: Onuljang Alerts
    interval: 5m
    rules:
      - uid: pg-approval-slow
        title: PG 결제 승인 지연 (p95 > 5s)
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(onuljang_payment_approval_seconds_bucket[10m])) by (le))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "PG 결제 승인 p95 {{ $value | printf \"%.1f\" }}초"

      - uid: notification-failure-spike
        title: 알림톡 발송 실패 급증
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(onuljang_notifications_total{result="fail"}[10m]))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "알림톡 발송 실패 {{ $value }}건 (최근 10분)"

  - orgId: 1
    name: onuljang-slow-query
    folder: Onuljang Alerts
    interval: 1m
    rules:
      # app_slow_query metric: BE에서 100ms 초과 JDBC 쿼리에만 query_id + improvable 라벨로 기록.
      # improvable="true" 만 알람 대상 — known-slow-queries.yml 등재 query_id 는 자동 제외.
      # BE 신규 부팅 후 ~5분 metric 적재 대기 후 발화 안정.

      - uid: slow-query-new-burst
        title: 새 slow query burst 감지 (improvable, 분당 3건+)
        condition: C
        noDataState: OK
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (query_id) (rate(app_slow_query_seconds_count{improvable="true"}[5m]))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "신규 slow query id={{ $labels.query_id }} — 분당 {{ $value | printf \"%.1f\" }}건 (개선 후보 또는 known-slow 등재)"

      - uid: slow-query-critical
        title: Slow query p95 > 1s 지속 (improvable)
        condition: C
        noDataState: OK
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum by (le) (rate(app_slow_query_seconds_bucket{improvable="true"}[10m])))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "improvable slow query p95 {{ $value | printf \"%.0f\" }}ms — 10분 이상 지속, 시스템 전반 부하"

      - uid: scheduler-failure
        title: 스케줄러 실행 실패
        noDataState: OK
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (scheduler, method) (increase(onuljang_scheduler_duration_seconds_count{result="failure"}[10m]))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.scheduler }}.{{ $labels.method }} 실패 {{ $value }}건 (최근 10분)"
          description: |
            스케줄러: {{ $labels.scheduler }}
            메서드: {{ $labels.method }}
            실패 횟수: {{ $value }}건 (최근 10분)

            ⚠️ RESOLVED는 10분 윈도우가 지났다는 의미일 뿐 결함이 해소된 것이 아니다.
            매일 1회 실행되는 cron이면 다음 실행은 24시간 후이므로 RESOLVED 후에도 데이터 결함은 남아 있을 수 있다.
            데이터 정합성을 직접 검증한 후에만 안전하다고 판단할 것.
